<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bond Calculator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background">
    <div class="blur blur1"></div>
    <div class="blur blur2"></div>
    <div class="blur blur3"></div>
</div>

<header>

    <div class="logo">

        <div class="logoCircle">
            💎
        </div>

        <div>

            <h1>Bond Calculator</h1>

            <p>Калькулятор доходности облигаций</p>

        </div>

    </div>

</header>

<main>

<section class="hero">

<h2>

Найди облигацию

</h2>

<p>

Введите ISIN, регистрационный номер или название

</p>

<div class="searchBox">

<input

id="searchInput"

placeholder="Например RU000A107B84"

autocomplete="off"

>

<button id="searchButton">

Поиск

</button>

</div>

<div id="loading">

<div class="spinner"></div>

<p>

Получаем данные Московской биржи...

</p>

</div>

</section>

<section

id="result"

class="hidden"

>

<div class="card">

<div class="titleRow">

<div>

<h2

id="bondName"

>

—

</h2>

<p

id="bondIsin"

>

—

</p>

</div>

<div

class="badge"

id="bondStatus"

>

Активна

</div>

</div>

<div class="grid">

<div class="item">

<span>

Цена

</span>

<strong

id="price"

>

—

</strong>

</div>

<div class="item">

<span>

НКД

</span>

<strong

id="aci"

>

—

</strong>

</div>

<div class="item">

<span>

Номинал

</span>

<strong

id="nominal"

>

—

</strong>

</div>

<div class="item">

<span>

Купон

</span>

<strong

id="coupon"

>

—

</strong>

</div>

<div class="item">

<span>

Дата погашения

</span>

<strong

id="maturity"

>

—

</strong>

</div>

<div class="item">

<span>

Дата оферты

</span>

<strong

id="offer"

>

—

</strong>

</div>

</div>

</div>
